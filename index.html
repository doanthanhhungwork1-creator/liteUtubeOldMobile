<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lite Tube - iPhone 6 Fix</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #ccc; margin: 0; padding: 0; }
        
        /* Đảm bảo ô tìm kiếm luôn nằm trên cùng và hiển thị rõ */
        #header-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #111;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        #search-box { 
            display: flex; 
            width: 100%;
        }

        input { 
            flex: 1; 
            padding: 12px; 
            background: #222; 
            border: 1px solid #444; 
            color: #fff; 
            font-size: 16px; 
            border-radius: 4px 0 0 4px;
            -webkit-appearance: none; /* Khử style mặc định của Safari */
        }

        button { 
            padding: 12px 20px; 
            background: #0056b3; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 0 4px 4px 0;
        }

        /* Khung video tối ưu cho iPhone dọc */
        #player-container { 
            background: #000; 
            display: none; 
            width: 100%;
        }

        /* Tìm đến đoạn .video-responsive cũ và dán đè đoạn này vào */
.video-responsive {
    position: relative;
    padding-bottom: 56.25%; /* Tỉ lệ 16:9 chuẩn */
    height: 0;
    overflow: hidden;
    background: #000;
    width: 100%;
}

.video-responsive iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
    border: 0;
}


        .close-btn { 
            background: #cc0000; 
            color: #fff; 
            text-align: center; 
            padding: 10px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer;
        }

        #results { padding: 10px; }

        .video-item { 
            display: flex; 
            border-bottom: 1px solid #222; 
            padding: 10px 0; 
            align-items: center;
        }

        .thumb { 
            width: 100px; 
            height: 60px; 
            margin-right: 10px; 
            border-radius: 4px; 
            object-fit: cover; 
        }

        .title { font-size: 14px; color: #fff; font-weight: bold; line-height: 1.3; }
    </style>
</head>
<body>

    <div id="header-wrapper">
        <div id="search-box">
            <input type="text" id="query" placeholder="Tìm video..." onkeypress="if(event.key==='Enter') search()">
            <button onclick="search()">TÌM</button>
        </div>
    </div>

    <div id="player-container"></div>

    <div id="results">
        <p style="text-align: center; margin-top: 20px;">Nhập từ khóa để tìm kiếm</p>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxEZy6agtbhlPQqQlLUIo8E1LfpqTvDa0oPMh0vXc11g8W9vvhxm2FL0NOe2ZnqjdQqjQ/exec";

        async function search() {
            const query = document.getElementById('query').value;
            if(!query) return;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<p style='text-align:center;'>Đang tìm...</p>";
            
            try {
                const response = await fetch(`${GAS_URL}?q=${encodeURIComponent(query)}`, { redirect: 'follow' });
                const data = await response.json();
                resultsDiv.innerHTML = "";
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'video-item';
                    div.onclick = () => playVideo(item.id, item.title);
                    div.innerHTML = `
                        <img class="thumb" src="${item.thumbnail}">
                        <div class="info">
                            <div class="title">${item.title}</div>
                            <div class="meta">${item.author}</div>
                        </div>
                    `;
                    resultsDiv.appendChild(div);
                });
            } catch (e) {
                resultsDiv.innerHTML = "<p>Lỗi kết nối.</p>";
            }
        }

        /* Sửa đoạn code bên trong hàm playVideo */
function playVideo(id, title) {
    const container = document.getElementById('player-container');
    container.innerHTML = ""; 
    container.style.display = 'block';
    
    // Tự động cuộn lên đầu trang để người dùng nhìn thấy video ngay
    window.scrollTo(0, 0); 

    // QUAN TRỌNG: Thêm playsinline=1 và vq=medium (cho 360p)
    container.innerHTML = `
        <div class="video-responsive">
            <iframe 
                src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1&vq=medium&rel=0&modestbranding=1" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="close-btn" onclick="closePlayer()" style="background: #cc0000; color: #fff; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; font-size: 14px; border-radius: 4px; margin-top: 5px;">ĐÓNG VIDEO X</div>
        <div id="playing-title" style="padding: 10px; font-weight: bold; color: #fff; font-size: 14px;">${title}</div>
    `;
                        }

        function closePlayer() {
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('player-container').innerHTML = '';
        }
    </script>
</body>
</html>
