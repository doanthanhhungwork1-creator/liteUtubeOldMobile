<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Tube - Máy Cũ</title>
    <style>
        /* CSS tối giản để giảm tải CPU render */
        body { font-family: sans-serif; background: #111; color: #ccc; margin: 0; padding: 10px; }
        #search-box { width: 100%; display: flex; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #fff; }
        button { padding: 10px; background: #444; color: white; border: none; cursor: pointer; }
        
        .video-item { display: flex; border-bottom: 1px solid #333; padding: 10px 0; text-decoration: none; color: inherit; align-items: center; }
        .thumb { width: 100px; height: auto; margin-right: 15px; border-radius: 4px; }
        .info { flex: 1; }
        .title { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .meta { font-size: 12px; color: #888; }

        #player-container { position: sticky; top: 0; background: #000; padding: 10px 0; z-index: 100; display: none; }
        video { width: 100%; max-height: 240px; background: #000; }
        .close-btn { color: red; cursor: pointer; font-weight: bold; padding: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div id="player-container">
        <span class="close-btn" onclick="closePlayer()">[ ĐÓNG X ]</span>
        <video id="main-video" controls autoplay playsinline></video>
        <h3 id="playing-title" style="font-size: 14px; padding: 5px;"></h3>
    </div>

    <div id="search-box">
        <input type="text" id="query" placeholder="Tìm video..." onkeypress="if(event.key==='Enter') search()">
        <button onclick="search()">TÌM</button>
    </div>

    <div id="results">
        <!-- Danh sách video sẽ hiện ở đây -->
        <p style="text-align: center;">Nhập từ khóa để xem video cho máy yếu...</p>
    </div>

   <script>
    // Danh sách các máy chủ dự phòng, nếu cái này lỗi bạn có thể thay cái khác
    // Một số instance tốt: https://pipedapi.lunar.icu, https://pipedapi.drgns.space, https://pipedapi.vube.cloud
    const API_BASE = "https://pipedapi.lunar.icu"; 

    async function search() {
        const query = document.getElementById('query').value;
        if(!query) return;
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "<p style='text-align:center'>Đang tìm kiếm...</p>";

        try {
            // Thêm tham số để tránh cache và kiểm tra phản hồi
            const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&filter=all`);
            
            if (!response.ok) throw new Error("Server đang bận");
            
            const data = await response.json();
            
            if(!data.items || data.items.length === 0) {
                resultsDiv.innerHTML = "Không tìm thấy kết quả.";
                return;
            }

            resultsDiv.innerHTML = "";
            data.items.forEach(item => {
                if(item.type === 'video') {
                    const div = document.createElement('div');
                    div.className = 'video-item';
                    // Tối ưu Thumbnail: Dùng ảnh nhỏ hơn để máy yếu load nhanh
                    const thumbUrl = item.thumbnail;
                    
                    div.onclick = () => playVideo(item.url.split('=')[1], item.title);
                    div.innerHTML = `
                        <img class="thumb" src="${thumbUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/100x60?text=No+Thumb'">
                        <div class="info">
                            <div class="title">${item.title}</div>
                            <div class="meta">${item.uploaderName} • ${item.duration}s</div>
                        </div>
                    `;
                    resultsDiv.appendChild(div);
                }
            });
        } catch (error) {
            console.error(error);
            resultsDiv.innerHTML = `<p style='color:orange; text-align:center'>Máy chủ ${API_BASE.split('//')[1]} đang quá tải hoặc gặp lỗi CORS. <br><br> Hãy thử lại sau vài giây hoặc báo cho admin thay Server.</p>`;
        }
    }

    async function playVideo(id, title) {
        const container = document.getElementById('player-container');
        const videoTag = document.getElementById('main-video');
        const titleTag = document.getElementById('playing-title');

        container.style.display = 'block';
        titleTag.innerText = "Đang lấy luồng video...";
        window.scrollTo(0, 0);

        try {
            const res = await fetch(`${API_BASE}/streams/${id}`);
            const data = await res.json();
            
            // Tìm luồng video chất lượng thấp nhất để máy cũ chạy mượt (thường là 240p hoặc 360p)
            let stream = data.videoStreams.find(s => s.quality === '360p' && !s.videoOnly) 
                         || data.videoStreams.find(s => !s.videoOnly)
                         || data.videoStreams[0];

            if(stream) {
                videoTag.src = stream.url;
                videoTag.play().catch(e => console.log("Cần nhấn Play thủ công"));
                titleTag.innerText = title;
            } else {
                throw new Error();
            }
        } catch (error) {
            alert("Lỗi: Không thể lấy luồng video. Có thể video bị hạn chế vùng.");
            container.style.display = 'none';
        }
    }

    function closePlayer() {
        const videoTag = document.getElementById('main-video');
        videoTag.pause();
        videoTag.src = "";
        document.getElementById('player-container').style.display = 'none';
    }
</script>
</body>
</html>
