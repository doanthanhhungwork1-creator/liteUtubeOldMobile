<!DOCTYPE html>
<html lang="vi">
<h <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0056b3">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Tube - for old mobile/car</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #efefef; margin: 0; padding: 20px; }
        
        /* Thanh tìm kiếm cố định */
        #search-box { 
            display: flex; gap: 10px; position: sticky; top: 0; 
            background: #0f0f0f; padding: 10px 0; z-index: 100;
            border-bottom: 1px solid #222;
        }
        input { 
            flex: 1; padding: 12px 20px; border-radius: 25px; 
            border: 1px solid #333; background: #121212; color: white; 
            font-size: 16px; outline: none; 
        }
        button { 
            padding: 12px 30px; border-radius: 25px; border: none; 
            background: #cc0000; color: white; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #ff0000; }

        /* Danh sách kết quả */
        #results { margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .video-item { 
            background: #181818; border-radius: 12px; overflow: hidden; 
            cursor: pointer; transition: transform 0.2s, background 0.2s;
            border: 1px solid #222;
        }
        .video-item:hover { transform: translateY(-5px); background: #252525; }
        
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #222; }
        
        .info { padding: 12px; }
        .title { 
            font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; 
        }
        .author { font-size: 12px; color: #aaa; }
        
        .vlc-btn { 
            margin-top: 10px; display: block; text-align: center;
            background: #ff8800; color: #000; padding: 6px; 
            border-radius: 6px; font-size: 12px; font-weight: bold;
        }

        /* Thông báo */
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #0056b3; color: white; padding: 10px 25px;
            border-radius: 30px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="query" placeholder="Tìm video... VLC sẽ tự khởi động" onkeypress="if(event.key==='Enter') search()">
        <button onclick="search()">TÌM KIẾM</button>
    </div>

    <div id="results">
        <p style="grid-column: 1/-1; text-align: center; color: #888; margin-top: 50px;">
            Nhấn vào video để mở trực tiếp bằng phần mềm VLC.
        </p>
    </div>

    <div id="toast">Đang khởi lệnh mở VLC...</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxEZy6agtbhlPQqQlLUIo8E1LfpqTvDa0oPMh0vXc11g8W9vvhxm2FL0NOe2ZnqjdQqjQ/exec";

        async function search() {
            const query = document.getElementById('query').value;
            if(!query) return;
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Đang kết nối thư viện YouTube...</p>";
            
            try {
                const response = await fetch(`${GAS_URL}?q=${encodeURIComponent(query)}`, { redirect: 'follow' });
                const data = await response.json();
                
                resultsDiv.innerHTML = "";
                if(!Array.isArray(data) || data.length === 0) {
                    resultsDiv.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Không tìm thấy kết quả.</p>";
                    return;
                }

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'video-item';
                    div.onclick = () => playVideo(item.id);
                    div.innerHTML = `
                        <img class="thumb" src="${item.thumbnail}" loading="lazy">
                        <div class="info">
                            <div class="title">${item.title}</div>
                            <div class="author">${item.author}</div>
                            <div class="vlc-btn">CHẠY VỚI VLC</div>
                        </div>
                    `;
                    resultsDiv.appendChild(div);
                });
            } catch (e) {
                resultsDiv.innerHTML = "<p style='grid-column: 1/-1; color:orange; text-align:center;'>Lỗi máy chủ. Vui lòng thử lại.</p>";
            }
        }

        function playVideo(id) {
            const videoUrl = `https://www.youtube.com/watch?v=${id}`;
            
            // Hiển thị thông báo tạm thời
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);

            // Lệnh kích hoạt VLC qua Protocol đã đăng ký
            window.location.href = `vlc://${videoUrl}`;
        }

        // Giải phóng bộ nhớ khi đóng
        window.onbeforeunload = () => {
            if(window.gc) window.gc();
        };
    </script>
</body>
</html>
