<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0056b3">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Tube - for old mobile/car</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #ccc; margin: 0; padding: 10px; }
        #search-box { width: 100%; display: flex; margin-bottom: 20px; position: sticky; top: 0; z-index: 99; background: #111; padding: 5px 0; }
        input { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: #fff; font-size: 16px; }
        button { padding: 12px; background: #0056b3; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* Ép GPU xử lý để giảm RAM */
        iframe { transform: translateZ(0); width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        .video-item { display: flex; border-bottom: 1px solid #333; padding: 12px 0; color: inherit; align-items: center; cursor: pointer; }
        .thumb { width: 120px; height: auto; margin-right: 15px; border-radius: 4px; background: #222; }
        .info { flex: 1; overflow: hidden; }
        .title { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { font-size: 12px; color: #888; }

        #player-container { position: sticky; top: 0; background: #000; padding: 5px 0; z-index: 100; display: none; border-bottom: 2px solid #0056b3; }
        .close-btn { color: #ff4444; cursor: pointer; font-weight: bold; padding: 8px; display: inline-block; background: #222; margin-bottom: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="player-container"></div>

    <div id="search-box">
        <input type="text" id="query" placeholder="Tìm video trên máy cũ..." onkeypress="if(event.key==='Enter') search()">
        <button onclick="search()">TÌM</button>
    </div>

    <div id="results">
        <p style="text-align: center; margin-top: 50px;">Hệ thống đã sẵn sàng.</p>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxEZy6agtbhlPQqQlLUIo8E1LfpqTvDa0oPMh0vXc11g8W9vvhxm2FL0NOe2ZnqjdQqjQ/exec";

        async function search() {
            const query = document.getElementById('query').value;
            if(!query) return;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<p style='text-align:center; color: #0088ff;'>Đang tải...</p>";
            try {
                const response = await fetch(`${GAS_URL}?q=${encodeURIComponent(query)}`, { redirect: 'follow' });
                const data = await response.json();
                if(!Array.isArray(data) || data.length === 0) {
                    resultsDiv.innerHTML = "<p style='text-align:center;'>Không có kết quả.</p>";
                    return;
                }
                resultsDiv.innerHTML = "";
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'video-item';
                    div.onclick = () => playVideo(item.id, item.title);
                    div.innerHTML = `
                        <img class="thumb" src="${item.thumbnail}" loading="lazy">
                        <div class="info">
                            <div class="title">${item.title}</div>
                            <div class="meta">${item.author}</div>
                        </div>
                    `;
                    resultsDiv.appendChild(div);
                });
            } catch (error) {
                resultsDiv.innerHTML = "<p style='color:orange; text-align:center;'>Lỗi kết nối.</p>";
            }
        }

        async function playVideo(id, title) {
            const container = document.getElementById('player-container');
            
            // BƯỚC 1: Xóa sạch Iframe cũ và giải phóng RAM video trước đó
            container.innerHTML = ""; 
            container.style.display = 'none';
            
            // BƯỚC 2: Gọi dọn dẹp rác hệ thống (Garbage Collection) nếu trình duyệt hỗ trợ
            if (window.gc) window.gc();

            // BƯỚC 3: Tạo trình phát mới sau một khoảng trễ cực ngắn để RAM kịp hồi lại
            setTimeout(() => {
                container.style.display = 'block';
                window.scrollTo(0, 0);
                container.innerHTML = `
                    <span class="close-btn" onclick="closePlayer()">[ ĐÓNG TRÌNH PHÁT X ]</span>
                    <div id="playing-title" style="padding: 10px; font-weight: bold; color: #fff;">${title}</div>
                    <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000;">
                        <iframe 
                            src="https://www.youtube.com/embed/${id}?autoplay=1&vq=medium&rel=0" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                `;
            }, 50);
        }

        function closePlayer() {
            const container = document.getElementById('player-container');
            // Hủy hoàn toàn nội dung để trình duyệt ngừng load dữ liệu ngầm
            container.innerHTML = ''; 
            container.style.display = 'none';
            // Ép giải phóng bộ nhớ
            if (window.gc) window.gc();
        }
    </script>
</body>
</html>
