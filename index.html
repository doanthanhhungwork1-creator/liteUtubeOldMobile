<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0056b3">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Tube - for old mobile/car</title>
    <style>
    body { font-family: sans-serif; background: #111; color: #ccc; margin: 0; padding: 10px; }
    
    /* Search box cố định */
    #search-box { width: 100%; display: flex; margin-bottom: 15px; position: sticky; top: 0; z-index: 101; background: #111; padding: 5px 0; }
    input { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: #fff; font-size: 16px; border-radius: 4px 0 0 4px; }
    button { padding: 12px; background: #0056b3; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 0 4px 4px 0; }

    /* FIX hiển thị cho màn hình dọc iPhone 6 */
    #player-container { 
        position: sticky; 
        top: 0; 
        background: #000; 
        z-index: 100; 
        display: none; 
        width: 100%;
        margin-bottom: 10px;
    }
    
    /* Tạo khung 16:9 chuẩn để iframe không bị méo */
    .video-responsive {
        position: relative;
        padding-bottom: 56.25%; /* Tỉ lệ 16:9 */
        height: 0;
        overflow: hidden;
        background: #000;
    }
    .video-responsive iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        border: 0;
    }

    .video-item { display: flex; border-bottom: 1px solid #333; padding: 10px 0; cursor: pointer; }
    .thumb { width: 100px; height: 60px; margin-right: 10px; border-radius: 4px; object-fit: cover; }
    .info { flex: 1; min-width: 0; } /* Tránh tràn chữ trên iPhone nhỏ */
    .title { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .meta { font-size: 11px; color: #888; }
    .close-btn { color: #fff; cursor: pointer; font-weight: bold; padding: 10px; display: block; text-align: center; background: #cc0000; font-size: 12px; }
</style>

<script>
    async function playVideo(id, title) {
        const container = document.getElementById('player-container');
        container.innerHTML = ""; 
        container.style.display = 'block';
        window.scrollTo(0, 0); // Tự động cuộn lên đầu để xem video

        // Thêm tham số playsinline=1 để Safari cho phép phát bên trong web thay vì nhảy ra app Youtube
        container.innerHTML = `
            <div id="playing-title" style="padding: 8px; font-size: 12px; font-weight: bold; color: #fff; background: #222;">${title}</div>
            <div class="video-responsive">
                <iframe 
                    src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1&rel=0&modestbranding=1" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="close-btn" onclick="closePlayer()">ĐÓNG VIDEO X</div>
        `;
    }

    function closePlayer() {
        const container = document.getElementById('player-container');
        container.innerHTML = ''; 
        container.style.display = 'none';
    }
</script>

</body>
</html>
